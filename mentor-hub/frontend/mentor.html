<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MentorHub</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="logo">MentorHub</div>
    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">Mentors</a></li>
      <li><a href="#" class="login-btn">Log in</a></li>
    </ul>
  </nav>

  <!-- Hero Section -->
  <section class="hero">
    <h1>Explore Our Mentors</h1>
    <p>Browse through our community of experts.</p>
  </section>

  <!-- Search Filters -->
  <section class="search-section">
    <form class="search-form">
      <select>
        <option>All Roles</option>
        <option>Accountant</option>
        <option>Engineer</option>
        <option>Designer</option>
        <option>Teacher</option>
      </select>

      <input type="text" placeholder="Filter by Tool (e.g. Python)">
      <input type="text" placeholder="Filter by Interest">

      <button type="submit">Search</button>
    </form>
  </section>
</body>
</html>
